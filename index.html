<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>多人对冲记分板 - 手机电脑通用</title>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
    <style>
        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }
        body {
            font-family: system-ui, -apple-system, 'Segoe UI', 'Roboto', 'Helvetica Neue', sans-serif;
            background: #f0f2f5;
            margin: 0;
            padding: 12px;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .container {
            max-width: 1200px;
            width: 100%;
            background: white;
            border-radius: 28px;
            box-shadow: 0 8px 30px rgba(0,0,0,0.08);
            padding: 16px 20px 28px;
        }
        h1 {
            font-size: 1.4rem;
            margin: 0 0 12px 0;
            color: #1e293b;
            text-align: center;
        }
        .room-section {
            background: #f1f5f9;
            border-radius: 20px;
            padding: 12px 16px;
            margin-bottom: 16px;
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            align-items: center;
        }
        .room-section span {
            font-size: 0.9rem;
            font-weight: 500;
        }
        .room-section input {
            flex: 2;
            min-width: 120px;
            padding: 10px 14px;
            font-size: 0.95rem;
            border-radius: 40px;
            border: 1px solid #cbd5e1;
            font-family: monospace;
            background: white;
        }
        .room-section button {
            padding: 10px 18px;
            background: #1e293b;
            color: white;
            border: none;
            border-radius: 40px;
            cursor: pointer;
            font-size: 0.9rem;
            font-weight: 500;
        }
        .toolbar {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-bottom: 16px;
            justify-content: space-between;
            align-items: center;
        }
        select, button {
            padding: 8px 14px;
            font-size: 0.85rem;
            border-radius: 40px;
            border: 1px solid #cbd5e1;
            background: white;
            cursor: pointer;
        }
        .total-area {
            background: #f1f5f9;
            border-radius: 40px;
            padding: 10px 16px;
            text-align: center;
            font-weight: 600;
            margin: 12px 0 18px;
            font-size: 1rem;
        }
        .players-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
            gap: 14px;
            margin-top: 8px;
        }
        .player-card {
            background: #ffffff;
            border-radius: 24px;
            padding: 14px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.04);
            border: 1px solid #e2edff;
        }
        .player-name {
            font-weight: 600;
            font-size: 1rem;
            margin-bottom: 10px;
            color: #0f172a;
        }
        input.score-input {
            width: 100%;
            padding: 14px 12px;
            font-size: 1.2rem;
            border-radius: 50px;
            border: 2px solid #cbd5e1;
            text-align: center;
            font-weight: 600;
            background: white;
            font-family: monospace;
        }
        input.score-input:focus {
            outline: none;
            border-color: #3b82f6;
        }
        .sync-note {
            font-size: 0.65rem;
            color: #475569;
            margin-top: 18px;
            text-align: center;
        }
        button:active {
            transform: scale(0.97);
        }
        @media (max-width: 600px) {
            .container { padding: 12px 16px 20px; }
            h1 { font-size: 1.2rem; }
            .player-name { font-size: 0.9rem; }
            input.score-input { padding: 12px 10px; font-size: 1rem; }
        }
    </style>
</head>
<body>
<div class="container">
    <h1>🎲 对冲记分板</h1>

    <div class="room-section">
        <span>🏠 房间号</span>
        <input type="text" id="roomInput" placeholder="例如: 001" value="001" autocomplete="off">
        <button id="joinRoomBtn">加入/切换</button>
        <span id="currentRoomDisplay" style="font-size:0.75rem; background:#e2e8f0; padding:5px 12px; border-radius:30px;"></span>
    </div>

    <div class="toolbar">
        <select id="playerCountSelect">
            <option value="2">2人</option>
            <option value="3">3人</option>
            <option value="4" selected>4人</option>
            <option value="5">5人</option>
            <option value="6">6人</option>
            <option value="7">7人</option>
            <option value="8">8人</option>
        </select>
        <button id="resetScoresBtn">🔄 一键归零</button>
    </div>

    <div id="totalPanel" class="total-area">📊 总分 = 0</div>
    <div id="playersContainer" class="players-grid"></div>
    <div class="sync-note">
        ✨ 实时同步 | 分数随意填（正数/负数）| 总和仅供参考
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyBsAn4E14FKJutkd_b7R4R0uoiLt5dKrQo",
        authDomain: "now-time-637c1.firebaseapp.com",
        databaseURL: "https://now-time-637c1-default-rtdb.firebaseio.com",
        projectId: "now-time-637c1",
        storageBucket: "now-time-637c1.firebasestorage.app",
        messagingSenderId: "563371293042",
        appId: "1:563371293042:web:c963ab777aad8a9cd145eb"
    };

    firebase.initializeApp(firebaseConfig);
    const database = firebase.database();

    let currentRoom = "001";
    let currentPlayerCount = 4;
    let isUpdatingFromRemote = false;

    const roomInput = document.getElementById('roomInput');
    const joinRoomBtn = document.getElementById('joinRoomBtn');
    const currentRoomDisplay = document.getElementById('currentRoomDisplay');
    const playerCountSelect = document.getElementById('playerCountSelect');
    const resetBtn = document.getElementById('resetScoresBtn');
    const playersContainer = document.getElementById('playersContainer');
    const totalPanel = document.getElementById('totalPanel');

    function getRoomRef() {
        return database.ref(`scores_final/${currentRoom}`);
    }

    function updateRoomDisplay() {
        currentRoomDisplay.innerText = currentRoom;
        let newUrl = window.location.pathname + `?room=${encodeURIComponent(currentRoom)}`;
        window.history.replaceState({}, "", newUrl);
    }

    function parseScore(value) {
        if (value === undefined || value === null || value === '') return 0;
        let cleaned = value.toString().trim();
        if (cleaned === '' || cleaned === '-') return 0;
        let num = parseFloat(cleaned);
        return isNaN(num) ? 0 : num;
    }

    async function initOrLoadRoom() {
        const roomRef = getRoomRef();
        const snapshot = await roomRef.once('value');
        let data = snapshot.val();
        if (!data) {
            const defaultScores = Array(currentPlayerCount).fill(0);
            await roomRef.set({
                playerCount: currentPlayerCount,
                scores: defaultScores
            });
        } else {
            if (data.playerCount) {
                currentPlayerCount = data.playerCount;
                playerCountSelect.value = String(currentPlayerCount);
            }
            if (data.scores && data.scores.length === currentPlayerCount) {
                renderScoreInputs(data.scores);
            } else if (data.scores) {
                let adjustedScores = [...data.scores];
                if (adjustedScores.length < currentPlayerCount) {
                    while (adjustedScores.length < currentPlayerCount) adjustedScores.push(0);
                } else {
                    adjustedScores = adjustedScores.slice(0, currentPlayerCount);
                }
                await roomRef.child('scores').set(adjustedScores);
                renderScoreInputs(adjustedScores);
            } else {
                const freshScores = Array(currentPlayerCount).fill(0);
                await roomRef.child('scores').set(freshScores);
                renderScoreInputs(freshScores);
            }
        }
        updateTotalDisplay();
    }

    function renderScoreInputs(scoresArray) {
        if (!scoresArray || scoresArray.length !== currentPlayerCount) return;
        playersContainer.innerHTML = '';
        for (let i = 0; i < currentPlayerCount; i++) {
            const card = document.createElement('div');
            card.className = 'player-card';
            card.innerHTML = `
                <div class="player-name">👤 玩家 ${i+1}</div>
                <input type="text" id="score_${i}" class="score-input" value="${scoresArray[i]}" inputmode="numeric" autocomplete="off">
            `;
            playersContainer.appendChild(card);
            const inputElem = document.getElementById(`score_${i}`);
            
            // 失去焦点保存
            inputElem.addEventListener('blur', (function(idx) {
                return async function(e) {
                    if (isUpdatingFromRemote) return;
                    let newVal = parseScore(e.target.value);
                    let oldVal = scoresArray[idx];
                    if (newVal !== oldVal) {
                        await updateSingleScore(idx, newVal);
                    } else {
                        e.target.value = newVal;
                    }
                };
            })(i));
            
            // 回车保存
            inputElem.addEventListener('keypress', (function(idx) {
                return function(e) {
                    if (e.key === 'Enter') {
                        e.preventDefault();
                        e.target.blur();
                    }
                };
            })(i));
        }
    }

    async function updateSingleScore(playerIndex, newScore) {
        const roomRef = getRoomRef();
        const snap = await roomRef.child('scores').once('value');
        let scores = snap.val() || Array(currentPlayerCount).fill(0);
        if (scores.length !== currentPlayerCount) scores = Array(currentPlayerCount).fill(0);
        
        scores[playerIndex] = newScore;
        
        isUpdatingFromRemote = true;
        await roomRef.child('scores').set(scores);
        isUpdatingFromRemote = false;
        updateTotalDisplay();
    }

    async function resetAllScores() {
        const zeroScores = Array(currentPlayerCount).fill(0);
        const roomRef = getRoomRef();
        isUpdatingFromRemote = true;
        await roomRef.child('scores').set(zeroScores);
        isUpdatingFromRemote = false;
        updateTotalDisplay();
        for (let i = 0; i < currentPlayerCount; i++) {
            const inp = document.getElementById(`score_${i}`);
            if (inp) inp.value = 0;
        }
    }

    async function changePlayerCount(newCount) {
        if (newCount === currentPlayerCount) return;
        
        const roomRef = getRoomRef();
        const snap = await roomRef.child('scores').once('value');
        let oldScores = snap.val() || [];
        
        let newScores;
        if (newCount > oldScores.length) {
            newScores = [...oldScores];
            while (newScores.length < newCount) newScores.push(0);
        } else {
            newScores = oldScores.slice(0, newCount);
        }
        
        currentPlayerCount = newCount;
        
        isUpdatingFromRemote = true;
        await roomRef.update({ 
            playerCount: currentPlayerCount, 
            scores: newScores 
        });
        isUpdatingFromRemote = false;
        renderScoreInputs(newScores);
        updateTotalDisplay();
    }

    async function updateTotalDisplay() {
        const roomRef = getRoomRef();
        const snap = await roomRef.once('value');
        const data = snap.val();
        if (!data || !data.scores) {
            totalPanel.innerText = `📊 总分 = 0`;
            return;
        }
        const total = data.scores.reduce((a, b) => a + b, 0);
        totalPanel.innerText = `📊 总分 = ${total}`;
    }

    function setupRealtimeListener() {
        const roomRef = getRoomRef();
        roomRef.off();
        roomRef.on('value', (snapshot) => {
            if (isUpdatingFromRemote) return;
            const data = snapshot.val();
            if (data) {
                if (data.playerCount && data.playerCount !== currentPlayerCount) {
                    currentPlayerCount = data.playerCount;
                    playerCountSelect.value = String(currentPlayerCount);
                }
                if (data.scores && data.scores.length === currentPlayerCount) {
                    renderScoreInputs(data.scores);
                }
                updateTotalDisplay();
            }
        });
    }

    function switchToRoom(newRoom) {
        if (!newRoom || newRoom.trim() === "") return;
        currentRoom = newRoom.trim();
        updateRoomDisplay();
        roomInput.value = currentRoom;
        setupRealtimeListener();
        initOrLoadRoom();
    }

    let intervalId;
    function startPolling() {
        if (intervalId) clearInterval(intervalId);
        intervalId = setInterval(async () => {
            const roomRef = getRoomRef();
            const snap = await roomRef.once('value');
            const data = snap.val();
            if (data && data.scores) {
                for (let i = 0; i < data.scores.length; i++) {
                    const inp = document.getElementById(`score_${i}`);
                    if (inp && parseFloat(inp.value) !== data.scores[i] && !isUpdatingFromRemote) {
                        inp.value = data.scores[i];
                    }
                }
                updateTotalDisplay();
            }
        }, 500);
    }

    joinRoomBtn.addEventListener('click', () => {
        switchToRoom(roomInput.value);
    });
    playerCountSelect.addEventListener('change', (e) => {
        changePlayerCount(parseInt(e.target.value));
    });
    resetBtn.addEventListener('click', resetAllScores);

    const urlParams = new URLSearchParams(window.location.search);
    let initRoom = urlParams.get('room');
    if (initRoom) {
        currentRoom = initRoom;
        roomInput.value = currentRoom;
    }
    updateRoomDisplay();

    initOrLoadRoom().then(() => {
        setupRealtimeListener();
        startPolling();
    });
</script>
</body>
</html>
