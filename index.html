<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>记分板-简单版</title>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
    <style>
        body { font-family: Arial; padding: 20px; max-width: 800px; margin: 0 auto; }
        input { font-size: 20px; padding: 8px; width: 150px; text-align: center; }
        .player { margin: 10px 0; padding: 10px; border: 1px solid #ccc; border-radius: 10px; }
        .total { font-size: 24px; font-weight: bold; margin: 20px 0; }
        button { padding: 8px 16px; font-size: 16px; margin: 5px; }
    </style>
</head>
<body>
    <h1>🎲 对冲记分板</h1>
    
    <div>
        房间号: <input type="text" id="roomId" value="test">
        <button onclick="switchRoom()">切换房间</button>
        <span id="roomShow"></span>
    </div>
    
    <div>
        <button onclick="changeCount(-1)">-人数</button>
        <span id="countShow">4</span> 人
        <button onclick="changeCount(1)">+人数</button>
        <button onclick="resetAll()">全部归零</button>
    </div>
    
    <div id="players"></div>
    <div class="total" id="total">总分: 0</div>
    <p>✨ 直接输入数字，负数先输减号，按回车保存</p>

<script>
    const config = {
        apiKey: "AIzaSyBsAn4E14FKJutkd_b7R4R0uoiLt5dKrQo",
        authDomain: "now-time-637c1.firebaseapp.com",
        databaseURL: "https://now-time-637c1-default-rtdb.firebaseio.com",
        projectId: "now-time-637c1",
        storageBucket: "now-time-637c1.firebasestorage.app",
        messagingSenderId: "563371293042",
        appId: "1:563371293042:web:c963ab777aad8a9cd145eb"
    };
    firebase.initializeApp(config);
    const db = firebase.database();

    let room = "test";
    let count = 4;
    let syncing = false;

    function getRef() { return db.ref(`simple/${room}`); }

    async function save(scores) {
        syncing = true;
        await getRef().set({ count: count, scores: scores });
        syncing = false;
    }

    async function load() {
        const snap = await getRef().once('value');
        const data = snap.val();
        if (data) {
            if (data.count) count = data.count;
            document.getElementById('countShow').innerText = count;
            if (data.scores && data.scores.length === count) {
                render(data.scores);
            } else {
                const scores = Array(count).fill(0);
                render(scores);
                save(scores);
            }
        } else {
            const scores = Array(count).fill(0);
            render(scores);
            save(scores);
        }
    }

    function render(scores) {
        const div = document.getElementById('players');
        div.innerHTML = '';
        for (let i = 0; i < scores.length; i++) {
            div.innerHTML += `
                <div class="player">
                    玩家${i+1}: 
                    <input type="number" id="inp_${i}" value="${scores[i]}" step="1" 
                           onchange="update(${i}, this.value)">
                </div>
            `;
        }
        const total = scores.reduce((a,b)=>a+b,0);
        document.getElementById('total').innerText = '总分: ' + total;
    }

    window.update = async function(idx, val) {
        if (syncing) return;
        let num = parseFloat(val);
        if (isNaN(num)) num = 0;
        const snap = await getRef().child('scores').once('value');
        let scores = snap.val() || Array(count).fill(0);
        scores[idx] = num;
        await save(scores);
        render(scores);
    }

    window.resetAll = async function() {
        const scores = Array(count).fill(0);
        await save(scores);
        render(scores);
    }

    window.changeCount = async function(delta) {
        let newCount = count + delta;
        if (newCount < 2) newCount = 2;
        if (newCount > 8) newCount = 8;
        if (newCount === count) return;
        
        const snap = await getRef().child('scores').once('value');
        let old = snap.val() || [];
        let newScores;
        if (newCount > old.length) {
            newScores = [...old];
            while (newScores.length < newCount) newScores.push(0);
        } else {
            newScores = old.slice(0, newCount);
        }
        count = newCount;
        document.getElementById('countShow').innerText = count;
        await getRef().set({ count: count, scores: newScores });
        render(newScores);
    }

    window.switchRoom = async function() {
        let newRoom = document.getElementById('roomId').value.trim();
        if (!newRoom) return;
        room = newRoom;
        document.getElementById('roomShow').innerText = room;
        window.history.replaceState({}, "", `?room=${room}`);
        await load();
        // 重新绑定监听
        getRef().off();
        getRef().on('value', (snap) => {
            if (syncing) return;
            const data = snap.val();
            if (data && data.scores && data.scores.length === count) {
                render(data.scores);
            }
        });
    }

    const urlRoom = new URLSearchParams(window.location.search).get('room');
    if (urlRoom) {
        room = urlRoom;
        document.getElementById('roomId').value = room;
    }
    document.getElementById('roomShow').innerText = room;
    load().then(() => {
        getRef().on('value', (snap) => {
            if (syncing) return;
            const data = snap.val();
            if (data && data.scores && data.scores.length === count) {
                render(data.scores);
            }
        });
    });
</script>
</body>
</html>
